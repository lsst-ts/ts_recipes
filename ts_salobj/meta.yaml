{% set data= load_setup_py_data() %}
{% set tag = "v4.4.0" %}
package:
  name: ts-salobj
  version: {{ GIT_DESCRIBE_TAG }}

source:
  git_url: https://github.com/lsst-ts/ts_salobj
  git_rev: {{ tag }}

build:
  script: python -m pip install --ignore-installed --no-deps .
  skip: True #[win]

requirements:
  host:
    - python
    - pip
    - setuptools_scm
    - setuptools
    - pytest-runner
  run:
    - python
    - setuptools
    - setuptools_scm
    - numpy
    - jsonschema
    - pyyaml

test:
  requires:
    - pytest
    - pytest-flake8
    - pytest-cov

# commands:
   # - py.test --pyargs lsst.ts.salobj tests/
